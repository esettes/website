<article class="card post-card reveal">
  <p class="eyebrow">{{ include.post.date | date: "%d/%m/%Y" }}</p>
  <h3>
    <a href="{{ include.post.url | relative_url }}">{{ include.post.title }}</a>
  </h3>
  <p>
    {{ include.post.excerpt | default: include.post.content | strip_html | strip_newlines | truncate: 180 }}
  </p>
  <a class="text-link" href="{{ include.post.url | relative_url }}">Leer post</a>
</article>
